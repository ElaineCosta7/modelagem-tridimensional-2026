<html>
  <head>
    <title>Realidade aumentada usando modelo 3D do A-frame e o marcardor Hiro.</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin 0px; overflow: hidden">
    <a-scene vr-mode-ui="enabled: false" embedded arjs="debugUIEnabled: false">
          <a-assets>
            <img id="my-image" src="https://x.com/QGdoInter/status/1750939029997039950">
          </a-assets>
      <a-marker preset="hiro">
          <a-plane color="#CCC" height="20" width="20"></a-plane>
          <a-plane src="#my-image" height="100" width="100" rotation="-90 0 1"></a-plane>
      </a-marker>
      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
